workflows:
  android-release:
    name: Android Release AAB
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: |
          cd app
          flutter pub get
      - name: Build Android App Bundle
        script: |
          cd app
          flutter build appbundle --release
    artifacts:
      - app/build/app/outputs/bundle/release/app-release.aab

  ios-release:
    name: iOS Release IPA
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: |
          cd app
          flutter pub get
      - name: Build iOS (маҷбуран build-number аз pubspec — барои App Store Connect)
        script: |
          cd app
          # Ҳар бор пас аз +30 дар pubspec иваз кунед; ин сатр кӯшиш мекунад IPA ба CFBundleVersion-и нодуруст наафтад
          FULL=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')
          NAME=${FULL%+*}
          NUMBER=${FULL#*+}
          echo "Using FLUTTER_BUILD_NAME=$NAME FLUTTER_BUILD_NUMBER=$NUMBER"
          flutter build ipa --release --build-name="$NAME" --build-number="$NUMBER"
    artifacts:
      - app/build/ios/ipa/*.ipa
