workflows:
  ios-release:
    name: iOS Release IPA
    max_build_duration: 90
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    integrations:
      # Номро дар Codemagic → Team settings → Integrations → App Store Connect тағйир диҳед
      app_store_connect: codemagic
    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.khuquqironanda.week
    scripts:
      - name: Install dependencies
        script: |
          cd app
          flutter pub get
      - name: Set up code signing
        script: |
          cd app
          keychain initialize
          app-store-connect fetch-signing-files "com.khuquqironanda.week" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
          security find-identity -v -p codesigning || true
      - name: Build IPA
        script: |
          cd app
          flutter build ipa --release --export-method app-store
    artifacts:
      - app/build/ios/ipa/*.ipa

  android-release:
    name: Android Release AAB
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Build AAB
        script: |
          cd app
          flutter pub get
          flutter build appbundle --release
    artifacts:
      - app/build/app/outputs/bundle/release/app-release.aab
