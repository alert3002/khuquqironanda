workflows:
  default-workflow:
    name: Default Workflow
    max_build_duration: 90
    instance_type: mac_mini_m2
    working_directory: app
    integrations:
      app_store_connect: huquqironanda
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: tj.book.books
    scripts:
      - name: Load team certificate into keychain
        script: |
          keychain initialize
          if ! keychain add-certificates; then
            echo ""
            echo "=========================================="
            echo "ERROR: Сертификат (.p12) дар Codemagic НЕСТ"
            echo "=========================================="
            echo "1. codemagic.io → Teams → [team name]"
            echo "2. Code signing identities → iOS"
            echo "3. Generate certificate (App Store Distribution)"
            echo "   ё Upload .p12 + password"
            echo "4. Apple Developer → Revoke iOS Distribution-ҳои кӯҳна"
            echo "=========================================="
            exit 1
          fi
          security find-identity -v -p codesigning
      - name: Fetch provisioning profile
        script: |
          set -e
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || true
      - name: Apply signing to Xcode
        script: |
          set -e
          xcode-project use-profiles --project ios/Runner.xcodeproj
          PROFILE_FILE=""
          for f in "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision; do
            [ -f "$f" ] || continue
            if security cms -D -i "$f" 2>/dev/null | grep -q "$BUNDLE_ID"; then
              PROFILE_FILE="$f"
              break
            fi
          done
          if [ -z "$PROFILE_FILE" ]; then
            echo "ERROR: Profile барои $BUNDLE_ID нест."
            echo "→ developer.apple.com → Profiles → + → App Store → tj.book.books"
            exit 1
          fi
          PROFILE_NAME=$(security cms -D -i "$PROFILE_FILE" | plutil -extract Name raw -)
          cat > "$HOME/export_options.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          echo "Profile: $PROFILE_NAME"
      - name: Install and build
        script: |
          set -e
          flutter pub get
          find . -name "Podfile" -execdir pod install \;
          xcode-project use-profiles --project ios/Runner.xcodeproj
          flutter build ipa --release \
            --export-options-plist="$HOME/export_options.plist"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
