workflows:
  default-workflow:
    name: Default Workflow
    max_build_duration: 90
    instance_type: mac_mini_m2
    working_directory: app
    integrations:
      app_store_connect: huquqironanda
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: tj.book.books
      vars:
        BUNDLE_ID: tj.book.books
    scripts:
      - name: Fetch signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          security find-identity -v -p codesigning
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || true
      - name: Apply profiles to Xcode
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj
          grep -E "DEVELOPMENT_TEAM|PROVISIONING_PROFILE|CODE_SIGN" \
            ios/Runner.xcodeproj/project.pbxproj | head -30 || true
      - name: Install dependencies
        script: |
          flutter pub get
          find . -name "Podfile" -execdir pod install \;
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-method app-store \
            --export-options-plist="$HOME/export_options.plist"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
