workflows:
  ios-release:
    name: iOS App Store (app/)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Build IPA from app/ (NOT repo root)
        script: |
          set -e
          cd app
          flutter pub get
          flutter build ipa --release
    artifacts:
      - app/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
