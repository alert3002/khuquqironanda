workflows:
  android-release:
    name: Android Release AAB
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: |
          if [ -f app/pubspec.yaml ]; then cd app; fi
          flutter pub get
      - name: Build Android App Bundle
        script: |
          cd app
          flutter build appbundle --release
    artifacts:
      - app/build/app/outputs/bundle/release/app-release.aab

  ios-release:
    name: iOS Release IPA
    max_build_duration: 90
    integrations:
      # Номи интегратсия дар Codemagic → Team settings → Integrations → App Store Connect
      app_store_connect: codemagic
    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.khuquqironanda.week
    scripts:
      - name: Get Flutter packages
        script: |
          cd app
          flutter pub get
      - name: Set up iOS code signing
        script: |
          cd app
          keychain initialize
          app-store-connect fetch-signing-files "com.khuquqironanda.week" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          cd app
          FULL=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')
          NAME=${FULL%+*}
          SPEC_NUM=${FULL#*+}
          CM=${BUILD_NUMBER:-1}
          FINAL=$(( CM + 100 ))
          if [ "$SPEC_NUM" -gt "$FINAL" ] 2>/dev/null; then FINAL=$SPEC_NUM; fi
          echo "pubspec +N=$SPEC_NUM BUILD_NUMBER=$CM => CFBundleVersion=$FINAL build-name=$NAME"
          flutter build ipa --release --build-name="$NAME" --build-number="$FINAL"
    artifacts:
      - app/build/ios/ipa/*.ipa
