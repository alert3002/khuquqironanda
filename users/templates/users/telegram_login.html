<!DOCTYPE html>
<html lang="tg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Воридшавӣ — Telegram</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      padding: 24px;
      box-sizing: border-box;
    }
    h1 { color: #1a237e; font-size: 20px; text-align: center; margin-bottom: 8px; }
    p { color: #555; font-size: 14px; text-align: center; max-width: 340px; line-height: 1.5; }
    #status { margin-top: 16px; color: #c62828; font-size: 14px; text-align: center; }
    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 28px;
      background: #0088cc;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Воридшавӣ тавассути Telegram</h1>
  <p>Тугмаро пахш кунед. Ба Telegram мегузаред ва ба барнома бармегардед.</p>

  {% if error %}
  <p id="status">{{ error }}</p>
  {% endif %}

  {% if oauth_ready %}
  <a id="login-btn" class="btn" href="#">Воридшавӣ бо Telegram</a>
  {% else %}
  <p id="status">OAuth танзим нашудааст (TELEGRAM_CLIENT_ID / TELEGRAM_CLIENT_SECRET дар .env)</p>
  {% endif %}

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('success') === '1' && params.get('token')) {
      document.body.innerHTML = '<p style="text-align:center;padding:24px;">Муваффақ! Бармегардонем…</p>';
    }

    const btn = document.getElementById('login-btn');
    if (btn) {
      const q = new URLSearchParams();
      if (params.get('device_id')) q.set('device_id', params.get('device_id'));
      if (params.get('app')) q.set('app', params.get('app'));
      btn.href = '/telegram-login/oauth/start/?' + q.toString();
    }
  </script>
</body>
</html>
